<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200&family=Roboto&display=swap');

  .container {
    width: 70vw;
    height: 80vh;
    background-color: white;
    margin-right: auto;
    margin-left: auto;
    border-radius: 2px;
  }

  #con1 {
    width: 70vw;
    height: 80vh;
    background-color: white;

    margin-left: auto;
    border-radius: 2px;
    padding: 0px;
    display: flex;
    flex-direction: row;
  }

  .left {
    width: 70%;
    height: 100%;
  }

  .right {
    width: 30%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .banner {
    height: 60px;
    border-bottom: .1px solid #dad8d8;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    padding-left: 15px;
    width: 100%;
    padding:10px;
  }

  .uc_o {
    height: 60px;
    display: flex;
    flex-direction: row;
    align-items: center;
  }

  .prop {
    height: 35px;
    width: 35px;
    border-radius: 50%;
    overflow:hidden;

  }

  .ubm {
    margin-left: 15px;
    font-size: 18px;
  }

  .clb {
    font-size: 30px;
    cursor: pointer;
    font-weight: bold;
    transform: rotate(45deg);
    width: 40px;
    height: 40px;
    margin: 20px;
    display: flex;
    flex-direction: row;
    align-items: center;
    margin-top: 30px;
    position: relative;
  }

  .ubcon {
    width: 100%;
    height: 80%;
    overflow-y: auto;
  }

  .capic {
    font-weight: bolder;
    display: flex;
    flex-direction: column;
  }

  .uk {
    margin-top: 10px;
    padding-left: 20px;
    font-size: 17px;
    font-family: 'Poppins', sans-serif;
    border-bottom: .1px solid #dad8d8;
  }

  .captio {
    word-wrap: break-word;
    margin-left: 10px;
  }

  .rbkc {
    border: 0.1px solid grey;
    font-size: 15px;
    height: 30px;
    border-radius: 5px;
    font-weight: bold;
    color: #000000;
    width: auto;
    margin: 5px;
    cursor: pointer;
    text-align: center;
  }
</style>
<style>
  .o_con>div {
    display: flex;
    flex-direction: row;
    padding: 5px;
    border-bottom: .1px solid #dad8d8;
  }

  .o_con>div>span {
    display: flex;
    flex-direction: column;
    margin-left: 15px;
    width: 70%;
  }

  .o_con>div>span>a {
    font-size: 16px;
    font-family: 'sui-semi-bold';
  }

  .o_con>div>span>span {
    font-size: 14px;
    font-family: 'sui-light';
    margin-left: 15px;
    word-break: break-word;
    height: auto;
  }

  .o_con>div>div {
    height: 50px;
    width: 50px;
    border-radius: 50%;
    overflow:hidden;
  }

  .o_con>div>div>img {
    height: 100%;
    width: 100%;
  }

  .o_con::-webkit-scrollbar {
    width: 0px;
  }

  .ubcon::-webkit-scrollbar {
    width: 0px;
  }

  .comm {
    width: 100%;
    height: 55px;
    display: flex;
    flex-direction: row;
    align-items: center;
    border-top: .2px solid #dad8d8;
    border-bottom: .2px solid #dad8d8;
    padding: 10px 10px;

  }

  .smi {
    width: 60px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
  }

  .comment {
    width: 100%;
    height: 90%;
    outline: none;
    border: none;
    font-size: 16px;
  }

  .posbu {
    cursor: pointer;
    color: #0095f6;
    font-size: 18px;
    font-family: 'sui-semi-bold';
  }
</style>

    <div class="left">

    </div>

</div>
<div class="bod" id="newp">
  <div class="container" id="nc">
    <div class="prog" id="pr2"></div>
    <div class="ban">
      <div onclick="closepost()" class="clb" id="c2">+</div>
    </div>
    <div class="poscon">
      <form action="/post" method="post" id="pform" autocomplete="off">
        {% csrf_token %}
        <div class="post_i" id="nps" onclick="upload()">
          <div id="ct">Add Image</div>
          <img width="100%" height="100%" alt="" src="" id="pimg" style="display:none">
          <input type="file" style="display:none" id="finp" onchange="selected()">
          <input type="hidden" value="{{user.username}}" id="username" name="user">
          <input type="hidden" id="type" name="type">
          <input type="hidden" id="url" name="url">
        </div>
        <div id="capcon">
          <input id="cap" type="text" placeholder="Caption" name="cap">
          <div id="pos" onclick="submit()">
            Post
          </div>
        </div>
      </form>
    </div>

  </div>
</div>
<div class="bod" id="dpin">
  <div class="container" id="dpcon">
    <div class="prog" id="pr3"></div>
    <div class="ban">
      <div onclick="closedp()" class="clb" id="c3">+</div>
    </div>
    <div>
      <form action="addpic" method="post" id="dpform">
        {% csrf_token%}
        <div class="post_i" onclick="upload2()">
          <div id="ct2">Upload Image</div>
          <img width="100%" height="100%" alt="" src="" id="pidp" style="display:none">
          <input type="file" style="display:none" id="finp2" onchange="selected2()">
          <input type="hidden" value="{{user.username}}" id="username2" name="user">
          <input type="hidden" id="dpurl" name="url">
        </div>
        <div id="update" onclick="update()">
          <div id="dpup">Update</div>
        </div>
      </form>
    </div>
  </div>
</div>
<script>

  function close(e) {
    document.getElementById("pc").style.visibility = "hidden";

  }
  function closedp(e) {
    document.getElementById("dpin").style.visibility = "hidden";

  }
  function cls(e) {
    document.getElementById("pc").style.visibility = "hidden";
  }
  function closepost(e) {
    document.getElementById("newp").style.visibility = "hidden";
  }
  function make(e) {
    document.getElementById("newp").style.visibility = "visible";
  }

  function upload() {
    document.getElementById("finp").click()
  }
  function upload2() {
    document.getElementById("finp2").click()
  }

  function rempost() {
    var id = document.getElementById("postid").value
    url = "removepost/" + id
    fetch(url).then(res => res.text()).then(data => {
      if (data == "True") {
        window.location.reload()
      }
    })
  }

</script>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyBsxMIXmRJebSOc5i7gYlYFT42TdOw6DcA",
    authDomain: "myproject-d9de9.firebaseapp.com",
    databaseURL: "https://myproject-d9de9.firebaseio.com",
    projectId: "myproject-d9de9",
    storageBucket: "myproject-d9de9.appspot.com",
    messagingSenderId: "403604530600",
    appId: "1:403604530600:web:60d9c6b109832036daa99d",
    measurementId: "G-NHJSQNBL1H"
  };
  firebase.initializeApp(firebaseConfig);
  firebase.analytics();

  function selected() {
    var input = document.getElementById("finp");
    document.getElementById("ct").style.display = "none";
    var hin = document.getElementById("pimg");
    hin.style.display = "flex";
    const file = input.files[0];
    if (file) {
      var reader = new FileReader();
      reader.addEventListener("load", (e) => {
        hin.src = e.srcElement.result
      })
      reader.readAsDataURL(file)
    }
  }
  function selected2() {
    var input = document.getElementById("finp2");
    document.getElementById("ct2").style.display = "none";
    var hin = document.getElementById("pidp");
    hin.style.display = "flex";
    const file = input.files[0];
    if (file) {
      var reader = new FileReader();
      reader.addEventListener("load", (e) => {
        hin.src = e.srcElement.result
      })
      reader.readAsDataURL(file)
    }
  }

  function submit() {
    var input = document.getElementById("finp");
    document.getElementById("pr2").style.visibility = "visible";
    var us = document.getElementById("username").value
    var cap = document.getElementById("cap").value
    ref = firebase.storage().ref()
    var file = input.files[0];
    if (file != undefined) {
      var name = new Date() + file.name
      meta = {
        contentType: file.type
      }
      task = ref.child(name).put(file, meta);
      task.then(snap => snap.ref.getDownloadURL()).then(url => {
        document.getElementById("url").value = url
        document.getElementById("type").value = file.type
        document.getElementById("pform").submit()
      })
    }
  }
  function update() {
    var input = document.getElementById("finp2");
    document.getElementById("pr3").style.visibility = "visible";
    var us = document.getElementById("username2").value
    var file = input.files[0];
    if (file != undefined) {
      var name = new Date() + file.name
      ref = firebase.storage().ref()
      meta = {
        contentType: file.type
      }
      task = ref.child(name).put(file, meta);
      task.then(snap => snap.ref.getDownloadURL()).then(url => {
        document.getElementById("dpurl").value = url
        document.getElementById("dpform").submit()
      })
    }
  }

  function addcom(e) {
    var id = document.getElementById("postid").value
    var cs = e.srcElement.parentElement.children
    var username = document.getElementById("lusername").value
    var comm;
    var inp;
    for (let i of cs) {
      if (i.type == "text") {
        inp = i
        comm = i.value
      }
    }
    if (comm.replaceAll(" ", "") != "") {
      var url = "/addcomment?id=" + id + "&comm=" + comm + "&user=" + username
      fetch(url).then(res => res.text()).then(data => {
        if (data == "True") {
          inp.value = ""
          window.location.reload()
        }
      })
    }
  }
</script>
